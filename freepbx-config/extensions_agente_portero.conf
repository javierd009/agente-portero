; =============================================================================
; Agente Portero - AudioSocket LOCAL con SLIN16 (16kHz)
; =============================================================================
;
; INSTALLATION:
; 1. Copy this file to FreePBX: /etc/asterisk/extensions_agente_portero.conf
; 2. Reload dialplan: asterisk -rx "dialplan reload"
; 3. Test with softphone by dialing 1010
;
; IMPORTANT: voice-service Docker container must be running locally
; on FreePBX server with port 9089 exposed.
;
; =============================================================================

[agente-portero-sitnova]
; Extension for AI security guard with 16kHz audio (better quality)
; Uses slin16 format for better resampling to OpenAI's 24kHz requirement

exten => 1010,1,NoOp(=== AGENTE PORTERO AI - LOCAL SLIN16 ===)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Set(CHANNEL(audioreadformat)=slin16)
 same => n,Set(CHANNEL(audiowriteformat)=slin16)
 same => n,AudioSocket(11111111-2222-3333-4444-555555555555,127.0.0.1:9089)
 same => n,Hangup()

; =============================================================================
; Include in from-internal context
; =============================================================================

[from-internal-custom]
include => agente-portero-sitnova
